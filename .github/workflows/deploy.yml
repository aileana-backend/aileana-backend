name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Decode SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: /tmp/deploy_key
          script: |
            cd /home/ubuntu/aileana-backend
            git pull origin main
            npm install --production
            npm run migrate
            pm2 reload aileana-api --update-env
